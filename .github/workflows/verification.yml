name: NutShell Cache Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r requirements-dev.txt
      - name: Check repository integrity
        run: |
          python tools/check_repo_health.py
      - name: Check Python style
        run: |
          ruff check src tests scripts tools
          ruff format --check src tests scripts tools
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --ignore=tests/test_real_dut_smoke.py --cov=cache_vip --cov-report=term-missing
      - name: Run core regression
        run: |
          PYTHONPATH=src python -c "from cache_vip.regression import run_core_regression; r = run_core_regression(seeds=(1,2,3), count=500); print('Status:', r['status'])"

  dut-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -r requirements-dev.txt
      - name: Verify independent DUT contract
        run: |
          python -m pytest tests/test_dut_regression.py tests/test_real_dut_adapter_unit.py -v

  real-dut-tests:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, x64, real-dut]
    steps:
      - uses: actions/checkout@v5
      - name: Stage host-compatible Real DUT artifacts
        env:
          REAL_DUT_ARTIFACT_DIR: ${{ vars.REAL_DUT_ARTIFACT_DIR }}
        run: |
          if [[ -n "${REAL_DUT_ARTIFACT_DIR}" ]]; then
            bash scripts/stage_real_dut_artifacts.sh
          else
            git clone --filter=blob:none --no-checkout https://github.com/OSCPU/NutShell.git NutShell
            git -C NutShell fetch --depth=1 origin 041f694965728ea183a0622daa1734002bf4621e
            git -C NutShell checkout --detach 041f694965728ea183a0622daa1734002bf4621e
            bash tools/generate_real_cache_rtl.sh
            bash scripts/build_real_dut.sh
          fi
      - name: Run real DUT tests on compatible Picker host
        run: |
          bash run_wsl_tests.sh
